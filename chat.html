<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Elite Arrows Chat</title>
  <link rel="stylesheet" href="styles.css?v=6">
</head>
<body class="dashboard-page chat-page">
  <div class="page-shell page-shell-wide">
    <section class="chat-shell">
      <aside class="chat-sidebar panel">
        <div>
          <p class="eyebrow">Elite Arrows</p>
          <h2>Player Chat</h2>
          <p class="hero-copy">Arrange games, add friends, and keep private chats to players you have accepted.</p>
        </div>
        <a class="ghost-button button-link" href="/dashboard.html">Back To Dashboard</a>

        <section class="chat-sidebar-section">
          <div class="panel-heading chat-sidebar-heading">
            <div>
              <p class="eyebrow">Rooms</p>
              <h3>League Chats</h3>
            </div>
          </div>
          <div class="chat-room-list" id="chatRoomList"></div>
        </section>

        <section class="chat-sidebar-section">
          <div class="panel-heading chat-sidebar-heading">
            <div>
              <p class="eyebrow">Friends</p>
              <h3>Private Chats</h3>
            </div>
          </div>
          <div class="chat-room-list" id="friendList"></div>
        </section>

        <section class="chat-sidebar-section">
          <div class="panel-heading chat-sidebar-heading">
            <div>
              <p class="eyebrow">Requests</p>
              <h3>Incoming</h3>
            </div>
          </div>
          <div class="chat-room-list" id="friendRequestList"></div>
        </section>

        <section class="chat-sidebar-section">
          <div class="panel-heading chat-sidebar-heading">
            <div>
              <p class="eyebrow">Players</p>
              <h3>Add Friends</h3>
            </div>
          </div>
          <div class="chat-room-list" id="playerDirectory"></div>
        </section>
      </aside>

      <main class="chat-main panel">
        <header class="panel-heading">
          <div>
            <p class="eyebrow">Chat Room</p>
            <h2 id="chatRoomTitle">Main Group Chat</h2>
          </div>
          <div class="hero-copy" id="chatRoomMeta"></div>
        </header>
        <div class="chat-messages" id="chatMessages"></div>
        <form id="chatForm" class="chat-composer">
          <div id="replyComposer" class="chat-reply-chip" hidden>
            <div>
              <strong id="replyLabel">Replying</strong>
              <p id="replyPreview"></p>
            </div>
            <button class="ghost-button chat-icon-button" id="clearReplyButton" type="button" aria-label="Cancel reply">&times;</button>
          </div>
          <div class="topbar-actions chat-toolbar">
            <button class="ghost-button emoji-button chat-icon-button" type="button" data-emoji="&#128512;" aria-label="Add smile emoji">&#128512;</button>
            <button class="ghost-button emoji-button chat-icon-button" type="button" data-emoji="&#127919;" aria-label="Add target emoji">&#127919;</button>
            <button class="ghost-button emoji-button chat-icon-button" type="button" data-emoji="&#128293;" aria-label="Add fire emoji">&#128293;</button>
            <button class="ghost-button emoji-button chat-icon-button" type="button" data-emoji="&#128079;" aria-label="Add clap emoji">&#128079;</button>
            <button class="ghost-button" id="recordAudioButton" type="button">Voice</button>
            <label class="ghost-button chat-upload-button" for="chatAttachments">Media</label>
            <input id="chatAttachments" name="chatAttachments" type="file" accept="image/*,video/*,audio/*" multiple hidden>
          </div>
          <div id="attachmentPreview" class="chat-room-list"></div>
          <div class="chat-input-row">
            <input id="chatMessageInput" name="message" type="text" placeholder="Type a message and press Enter" autocomplete="off">
            <button class="primary-button chat-icon-button" type="submit" aria-label="Send message">&#10148;</button>
          </div>
        </form>
      </main>
    </section>
  </div>
  <script src="chat-app.js?v=5"></script>
</body>
</html>
